<div id="app" style="width:100%;height:100vh;overflow:hidden;background:#080809;"></div>
<div style="position:fixed;left:0;right:0;bottom:0;display:flex;gap:14px;align-items:center;padding:10px 16px;font-family:system-ui,sans-serif;font-size:13px;color:#bbb;background:rgba(8,8,9,0.6);backdrop-filter:blur(6px);">
  <button id="play" style="background:#222;color:#eee;border:1px solid #444;border-radius:8px;padding:6px 14px;cursor:pointer;">Pause</button>
  <label>Speed <input id="speed" type="range" min="1" max="120" value="40" style="width:110px;vertical-align:middle;"> <span id="spd">40×</span></label>
  <label style="cursor:pointer;"><input id="exp" type="checkbox"> exploded</label>
  <label style="cursor:pointer;"><input id="tilt" type="checkbox" checked> 3/4 view</label>
  <span id="clock" style="margin-left:auto;font-variant-numeric:tabular-nums;color:#fff;font-size:15px;">--:--:--</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const mount=document.getElementById('app'); let W=mount.clientWidth,H=mount.clientHeight;
  const scene=new THREE.Scene(); scene.background=new THREE.Color(0x080809);
  const camera=new THREE.PerspectiveCamera(38,W/H,0.1,1000);
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(W,H); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  mount.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.45));
  const key=new THREE.DirectionalLight(0xffffff,0.8); key.position.set(18,40,30); scene.add(key);
  const rimL=new THREE.DirectionalLight(0x99aacc,0.45); rimL.position.set(-25,18,-18); scene.add(rimL);

  const root=new THREE.Group(); scene.add(root);

  const Rdial=18.5; // mm
  const deg=x=>x*Math.PI/180;

  // ============ LAYER 1: LED PCB (bottom) ============
  const pcbG=new THREE.Group(); root.add(pcbG);
  const pcb=new THREE.Mesh(new THREE.CylinderGeometry(Rdial,Rdial,0.8,96),
    new THREE.MeshStandardMaterial({color:0x0a1410,roughness:0.8,metalness:0.1}));
  pcbG.add(pcb);
  // LED emitters on the PCB (second ring 60, minute ring 60, hour hub 12)
  function emitter(r,d,color){
    const a=deg(d-90);
    const mat=new THREE.MeshStandardMaterial({color:0x202020,emissive:color,emissiveIntensity:0,roughness:0.4});
    const m=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.22,0.3),mat);
    m.position.set(r*Math.cos(a),0.5,r*Math.sin(a)); m.rotation.y=-a; pcbG.add(m);
    return {mat,color:new THREE.Color(color)};
  }
  const R_sec=16.5,R_min=14.5,R_hub=2.5;
  const sec=[],minE=[],hourE=[];
  for(let i=0;i<60;i++) sec.push(emitter(R_sec,i*6,0x33ccff));
  for(let i=0;i<60;i++) minE.push(emitter(R_min,i*6,0x4fd6a6));
  for(let i=0;i<12;i++) hourE.push(emitter(R_hub,i*30,0xf2a623));

  // ============ LAYER 2: HUME branded MASK (middle) ============
  // Opaque face via canvas texture (crest, HUME, indices, co-brand, MASTER CHRONOMETER),
  // with transparent holes where the second-ring LEDs show through.
  const maskG=new THREE.Group(); root.add(maskG);
  function maskTexture(){
    const S=1024, c=document.createElement('canvas'); c.width=c.height=S; const x=c.getContext('2d');
    const cx=S/2, cy=S/2, R=S*0.5;
    // opaque dial face
    x.fillStyle="#0a0a0c"; x.beginPath(); x.arc(cx,cy,R,0,7); x.fill();
    // indices (printed)
    x.strokeStyle="#d8d8dc"; x.lineCap="round";
    for(let i=0;i<12;i++){
      const a=deg(i*30-90), isTop=(i===0);
      const rO=R*0.78, rI=R*(isTop?0.69:0.72);
      x.lineWidth=isTop?S*0.008:S*0.005;
      x.beginPath(); x.moveTo(cx+rI*Math.cos(a),cy+rI*Math.sin(a));
      x.lineTo(cx+rO*Math.cos(a),cy+rO*Math.sin(a)); x.stroke();
    }
    // crest (locked Concept C) at top
    const k=R*0.0016, TX=cx, TY=cy-R*0.46;
    function P(X,Y){return [TX+(X-50)*k*64/64*1, TY+(Y-58)*k];}
    x.strokeStyle="#f4f4f6"; x.lineWidth=9*k; x.lineJoin="miter"; x.lineCap="butt";
    const sc=R*0.0011; const ox=cx, oy=cy-R*0.50;
    function q(X,Y){return [ox+(X-50)*sc, oy+(Y-14)*sc];}
    x.beginPath();
    let s=q(18,14); x.moveTo(...s);
    x.lineTo(...q(18,58));
    // approximate the curve to point
    x.bezierCurveTo(...q(18,84),...q(34,100),...q(50,108));
    x.bezierCurveTo(...q(66,100),...q(82,84),...q(82,58));
    x.lineTo(...q(82,14));
    x.lineWidth=9*sc; x.stroke();
    // crossbar
    const b1=q(18,44.5), b2=q(82,44.5);
    x.beginPath(); x.moveTo(...b1); x.lineTo(...b2); x.lineWidth=9*sc; x.stroke();
    // HUME wordmark
    x.fillStyle="#f4f4f6"; x.textAlign="center"; x.textBaseline="middle";
    x.font=`800 ${R*0.115}px Arial`;
    x.save(); x.translate(cx,cy-R*0.30);
    // letter-spacing fake
    x.fillText("H U M E",0,0); x.restore();
    // co-brand: ANTHROP\C logo above 6 o'clock (drawn when loaded; see below)
    if(window.__anthLogo && window.__anthLogo.complete){
      const img=window.__anthLogo;
      const lw=R*0.30, lh=lw*(img.height/img.width);
      x.drawImage(img, cx-lw/2, cy+R*0.42-lh/2, lw, lh);
    }
    // MASTER CHRONOMETER
    x.fillStyle="#cfcfcf"; x.font=`500 ${R*0.034}px Arial`;
    x.fillText("MASTER CHRONOMETER",cx,cy+R*0.42+R*0.06+R*0.05);
    // PUNCH HOLES for second-ring LEDs (transparent) so light shows through
    x.globalCompositeOperation="destination-out";
    for(let i=0;i<60;i++){
      const a=deg(i*6-90);
      const rr=R*(R_sec/Rdial)*0.985;
      x.beginPath(); x.arc(cx+rr*Math.cos(a),cy+rr*Math.sin(a),R*0.012,0,7); x.fill();
    }
    x.globalCompositeOperation="source-over";
    return new THREE.CanvasTexture(c);
  }
  let maskTex=maskTexture();
  const mask=new THREE.Mesh(new THREE.CylinderGeometry(Rdial,Rdial,0.4,96),
    new THREE.MeshStandardMaterial({map:maskTex,transparent:true,roughness:0.85,metalness:0.05}));
  // texture is on the flat top: apply via a separate disc
  const maskFace=new THREE.Mesh(new THREE.CircleGeometry(Rdial,96),
    new THREE.MeshStandardMaterial({map:maskTex,transparent:true,roughness:0.85,side:THREE.DoubleSide}));
  maskFace.rotation.x=-Math.PI/2; maskFace.position.y=0.21;
  const maskBody=new THREE.Mesh(new THREE.CylinderGeometry(Rdial,Rdial,0.4,96),
    new THREE.MeshStandardMaterial({color:0x0a0a0c,roughness:0.85}));
  maskG.add(maskBody); maskG.add(maskFace);

  // ============ LAYER 3: raised light-pipe HANDS (top) + flush SECOND SEGMENTS (in mask) ============
  const handG=new THREE.Group(); root.add(handG);
  // second ring: 60 FLUSH rectangular light-guide segments set into the mask face,
  // near-touching to read as a cohesive segmented ring (sit at mask plane, not raised).
  const secNubs=[];
  const segG=new THREE.Group(); maskG.add(segG);   // belongs to the MASK layer, flush in its face
  for(let i=0;i<60;i++){
    const a=deg(i*6-90);
    const mat=new THREE.MeshStandardMaterial({color:0x33ccff,emissive:0x33ccff,emissiveIntensity:0,roughness:0.2,metalness:0.0,transparent:true,opacity:0.4});
    // tangential rectangle: wide along the ring, short radially. pitch ~1.73mm -> ~1.45 wide
    const seg=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.08,1.45),mat);
    seg.position.set(R_sec*Math.cos(a),0.42,R_sec*Math.sin(a));  // flush with mask top (~0.41)
    seg.rotation.y=-a;   // long edge tangent to ring
    segG.add(seg); secNubs.push(mat);
  }
  // Hands are MOLDED RAISED CHANNELS: half-round ridges formed in the mask,
  // flat bottom seated flush to the mask face ALONG THEIR WHOLE LENGTH (continuous
  // support, not point-mounted at the hub), rounded top proud of it.
  const MIN_H=0.5, HOUR_H=0.8;   // ridge height proud of the mask (thin)
  // Channel = a simple flat bar: length along X (radial), thin in Y (proud of dial),
  // narrow in Z (tangential width). Lies FLAT on the dial; rotated once in-plane.
  function makeChannel(width, len, height){
    return new THREE.BoxGeometry(len, height, width);  // X=length, Y=height, Z=width
  }
  // THREE ZONES radiating from center:
  //   hub -> HOUR hands (short, branch from center) -> GAP (branding) -> MINUTE pipes (outer)
  // minute channels: ALL 60, outer band only (10.0 -> 15.0), leaving the inner
  // zone clear for the HUME/ANTHROPIC branding.
  const R_min_in = 10.0, R_min_out = 15.0;
  const minPipes=[], minMesh=[];
  for(let i=0;i<60;i++){
    const a=deg(i*6-90), len=R_min_out-R_min_in, midR=R_min_in+len/2;
    const mat=new THREE.MeshStandardMaterial({color:0x4fd6a6,emissive:0x4fd6a6,emissiveIntensity:0,roughness:0.18,metalness:0.0,transparent:true,opacity:0.09});
    const pipe=new THREE.Mesh(makeChannel(0.4,len,MIN_H),mat);
    pipe.position.set(midR*Math.cos(a), MIN_H/2, midR*Math.sin(a));  // sits ON dial, half-height up
    pipe.rotation.y=-a;                                              // length points radially outward
    handG.add(pipe); minPipes.push(mat); minMesh.push(pipe);
  }
  // hour channels: ALL 12, SHORT, branching from the very center outward (0.8 -> 4.2).
  // Well inside the branding gap so they read as hour-hand stubs from the middle.
  const R_hour_in = 0.8, R_hour_out = 4.2;
  const hourPipes=[], hourMesh=[];
  for(let i=0;i<12;i++){
    const a=deg(i*30-90), len=R_hour_out-R_hour_in, midR=R_hour_in+len/2;
    const mat=new THREE.MeshStandardMaterial({color:0xf2a623,emissive:0xf2a623,emissiveIntensity:0,roughness:0.18,metalness:0.0,transparent:true,opacity:0.09});
    const pipe=new THREE.Mesh(makeChannel(0.9,len,HOUR_H),mat);
    pipe.position.set(midR*Math.cos(a), HOUR_H/2, midR*Math.sin(a));
    pipe.rotation.y=-a;
    handG.add(pipe); hourPipes.push(mat); hourMesh.push(pipe);
  }
  // OUTER HOUR MARKERS: a ring of 12 amber markers just inside the minute band.
  // The active one lights at the current hour, so the eye connects the inner hour
  // stub + this outer marker into one long hour-hand reference line.
  const R_hmark = 9.4;
  const hourMarks=[];
  for(let i=0;i<12;i++){
    const a=deg(i*30-90);
    const mat=new THREE.MeshStandardMaterial({color:0xf2a623,emissive:0xf2a623,emissiveIntensity:0,roughness:0.18,metalness:0.0,transparent:true,opacity:0.09});
    const mk=new THREE.Mesh(makeChannel(0.9,1.2,HOUR_H),mat);   // small radial tick
    mk.position.set(R_hmark*Math.cos(a), HOUR_H/2, R_hmark*Math.sin(a));
    mk.rotation.y=-a;
    handG.add(mk); hourMarks.push(mat);
  }
  // (no center hub dot)


  // ---- layout (assembled vs exploded) ----
  // Channels are MOLDED INTO the mask: in assembled view their flat base sits
  // exactly on the mask's top face (no gap). Exploded view lifts them to show layers.
  function layout(ex){
    pcbG.position.y = 0;
    maskG.position.y = 1.2 + ex*7;
    handG.position.y = (1.2 + 0.2) + ex*14;   // mask top face; channels rise from here
  }
  layout(0);

  // ---- clock ----
  let simSeconds=10*3600+8*60+30, playing=true, speed=40, exploded=false, tiltMode=true, illuminate=true;
  const off=new THREE.Color(0x202020);
  function render(){
    const s=simSeconds%60, sF=Math.floor(s), sFr=s-sF;
    sec.forEach((o,i)=>{let v=0; if(i===sF)v=1-sFr; else if(i===(sF+1)%60)v=sFr;
      o.mat.emissiveIntensity=v*2.2; o.mat.color.copy(v>0.04?o.color:off);});
    // all 60 second segments always present as faint transparent acrylic; active glows
    secNubs.forEach((mat,i)=>{let v=0; if(i===sF)v=1-sFr; else if(i===(sF+1)%60)v=sFr;
      mat.emissiveIntensity=v*4.2; mat.opacity=0.18+v*0.8;});
    const m=Math.floor(simSeconds/60)%60;
    minE.forEach((o,i)=>{const on=i===m;o.mat.emissiveIntensity=on?1.6:0;o.mat.color.copy(on?o.color:off);});
    const h12=Math.floor(simSeconds/3600)%12;
    hourE.forEach((o,i)=>{const on=i===h12;o.mat.emissiveIntensity=on?1.6:0;o.mat.color.copy(on?o.color:off);});
    // raised hands point at current time
    // light only the active minute & hour pipe; all others stay faint clear acrylic
    // lit channel: glows but stays TRANSLUCENT so printed branding shows through
    // even when a hand crosses it. Higher emissive compensates for lower opacity.
    // lit channel: glows but stays TRANSLUCENT so printed branding shows through.
    // Unlit channels rest VERY faint (0.025/0.03) so the 72-channel fan doesn't
    // blanket the dial and bury the wordmark/logo at rest.
    // lit hand: bright and solid so it reads strongly. unlit channels rest VERY
    // faint so the logo + dial text show clearly through the channel layer.
    // lit hand: bright, solid, writes depth (reads as a real hand over the dial).
    // depthWrite off ONLY when faint: stops the transparent channel from carving
    // the text in the depth buffer, without detaching it from the surface.
    minPipes.forEach((mat,i)=>{const on=(i===m); mat.emissiveIntensity=on?2.6:0; mat.opacity=on?0.92:0.09; mat.depthWrite=on;});
    hourPipes.forEach((mat,i)=>{const on=(i===h12); mat.emissiveIntensity=on?2.6:0; mat.opacity=on?0.95:0.09; mat.depthWrite=on;});
    hourMarks.forEach((mat,i)=>{const on=(i===h12); mat.emissiveIntensity=on?2.6:0; mat.opacity=on?0.95:0.09; mat.depthWrite=on;});
    const hh=String(Math.floor(simSeconds/3600)%24).padStart(2,"0");
    document.getElementById("clock").textContent=`${hh}:${String(m).padStart(2,"0")}:${String(sF).padStart(2,"0")}`;
  }

  // camera
  let down=false,btn=0,px=0,py=0,th=0.5,ph=0.78,rad=58,pX=0,pY=0,panTX=0,panTY=0;
  function cam(){
    if(tiltMode){camera.position.set(rad*Math.sin(ph)*Math.sin(th)+panTX,rad*Math.cos(ph)+6+panTY,rad*Math.sin(ph)*Math.cos(th));camera.up.set(0,1,0);}
    else{camera.position.set(pX+panTX,rad,pY+panTY+0.001);camera.up.set(0,0,-1);}
    camera.lookAt(panTX,(tiltMode?2:0)+panTY,panTY);
  }
  cam();
  renderer.domElement.addEventListener('mousedown',e=>{down=true;btn=e.button;px=e.clientX;py=e.clientY;});
  renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
  addEventListener('mouseup',()=>down=false);
  addEventListener('mousemove',e=>{if(!down)return;const dx=e.clientX-px,dy=e.clientY-py;px=e.clientX;py=e.clientY;
    const panning=(btn===2||e.shiftKey);
    if(panning){ panTX-=dx*0.06; panTY+=dy*0.06; cam(); }
    else if(tiltMode){ th-=dx*0.01; ph=Math.max(0.12,Math.min(1.5,ph-dy*0.01)); cam(); }
    else{root.rotation.y-=dx*0.01;}});
  renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();rad=Math.max(32,Math.min(130,rad+e.deltaY*0.04));cam();},{passive:false});

  document.getElementById("play").onclick=function(){playing=!playing;this.textContent=playing?"Pause":"Play";};
  document.getElementById("speed").oninput=function(){speed=+this.value;document.getElementById("spd").textContent=speed+"×";};
  document.getElementById("exp").onchange=function(){exploded=this.checked;layout(exploded?1:0);};
  document.getElementById("tilt").onchange=function(){tiltMode=this.checked;cam();};

  let last=performance.now();
  function loop(now){requestAnimationFrame(loop);const dt=(now-last)/1000;last=now;
    if(playing)simSeconds+=dt*speed; render(); renderer.render(scene,camera);}
  requestAnimationFrame(loop);
  addEventListener('resize',()=>{W=mount.clientWidth;H=mount.clientHeight;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();});
})();
</script>
