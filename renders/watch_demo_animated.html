<div id="info" style="font-family:system-ui,sans-serif;font-size:13px;color:#bbb;padding:6px 0;">
  Drag to orbit · scroll to zoom · right-drag to pan
</div>
<div id="app" style="width:100%;height:520px;border-radius:12px;overflow:hidden;background:#0d0d0f;"></div>
<div style="display:flex;gap:12px;align-items:center;padding:10px 0;font-family:system-ui,sans-serif;font-size:13px;color:#bbb;flex-wrap:wrap;">
  <button id="play" style="background:#2a2a30;color:#eee;border:1px solid #444;border-radius:8px;padding:6px 14px;cursor:pointer;">Pause</button>
  <label style="display:flex;gap:6px;align-items:center;">Speed
    <input id="speed" type="range" min="1" max="120" value="40" style="width:140px;">
    <span id="spd">40×</span>
  </label>
  <label style="display:flex;gap:6px;align-items:center;cursor:pointer;">
    <input id="explode" type="checkbox"> explode boards
  </label>
  <span id="clock" style="margin-left:auto;font-variant-numeric:tabular-nums;color:#eee;font-size:15px;">--:--:--</span>
</div>
<div style="font-family:system-ui,sans-serif;font-size:12px;color:#888;padding-bottom:8px;display:flex;gap:16px;flex-wrap:wrap;">
  <span><b style="color:#5fa8ff">●</b> second (sweeps)</span>
  <span><b style="color:#4fd6a6">●</b> minute</span>
  <span><b style="color:#f2a623">●</b> hour pipe</span>
  <span><b style="color:#f08060">●</b> GMT (rim)</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const mount=document.getElementById('app'); const W=mount.clientWidth,H=520;
  const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0d0d0f);
  const camera=new THREE.PerspectiveCamera(40,W/H,0.1,1000);
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(W,H); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  mount.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.45));
  const key=new THREE.DirectionalLight(0xffffff,0.85); key.position.set(20,40,30); scene.add(key);
  const fillL=new THREE.DirectionalLight(0x88aaff,0.35); fillL.position.set(-30,20,-20); scene.add(fillL);

  const root=new THREE.Group(); scene.add(root); root.rotation.x=-0.35;

  const Rdial=18.5, top=0.4;

  // ---- DIAL BOARD GROUP ----
  const dialG=new THREE.Group(); root.add(dialG);
  const board=new THREE.Mesh(new THREE.CylinderGeometry(Rdial,Rdial,0.8,96),
    new THREE.MeshStandardMaterial({color:0x0a1a0f,roughness:0.7,metalness:0.1}));
  dialG.add(board);

  const bezel=new THREE.Mesh(new THREE.TorusGeometry(18.2,0.4,10,120),
    new THREE.MeshStandardMaterial({color:0xC9A227,roughness:0.3,metalness:0.85}));
  bezel.rotation.x=Math.PI/2; bezel.position.y=top+0.2; dialG.add(bezel);

  function gapCenter(a){const n=Math.round((a-3)/6);return ((3+6*n)%360+360)%360;}

  // LED factory returns mesh+material so we can change emissive at runtime
  function mkLed(r,deg,color,y){
    const a=deg*Math.PI/180;
    const mat=new THREE.MeshStandardMaterial({color:0x222222,emissive:color,emissiveIntensity:0.0,roughness:0.4});
    const m=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.25,0.3),mat);
    m.position.set(r*Math.cos(a),(y||top+0.12),r*Math.sin(a)); m.rotation.y=-a;
    dialG.add(m); return {mat,color:new THREE.Color(color)};
  }

  const R_sec=16.5,R_min=14.5,R_gmt_led=13.0,R_rim=18.0,R_hub=2.5;
  const R_min_tip=14.0, R_hour_tip=9.5;        // minute reaches near ring; hour is short
  const PLATE_TOP=1.30, HOUR_Y=1.80;           // flush minute at plate face, hour raised
  const sec=[],min=[],gmt=[],hour=[];
  for(let i=0;i<60;i++) sec.push(mkLed(R_sec,i*6,0x5fa8ff));
  for(let i=0;i<60;i++) min.push(mkLed(R_min,i*6,0x4fd6a6));

  // 60 flush MINUTE HAND pipes: long thin radial, sit at plate top (flush), lit one at a time
  const minHand=[];
  for(let i=0;i<60;i++){
    const a=i*6*Math.PI/180, len=R_min_tip-R_hub;
    const mat=new THREE.MeshStandardMaterial({color:0x4fd6a6,transparent:true,opacity:0.10,emissive:0x4fd6a6,emissiveIntensity:0.0,roughness:0.2});
    const p=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,len,8),mat);
    p.rotation.z=Math.PI/2; const midR=R_hub+len/2;
    p.position.set(midR*Math.cos(a),PLATE_TOP,midR*Math.sin(a)); p.rotation.y=-a;
    dialG.add(p); minHand.push(mat);
  }
  for(let k=0;k<24;k++){
    const nud=gapCenter(k*15);
    gmt.push({led:mkLed(R_gmt_led,nud,0xf08060),ang:nud});
    // GMT fiber to rim
    const a=nud*Math.PI/180,len=R_rim-R_gmt_led;
    const fmat=new THREE.MeshStandardMaterial({color:0xf08060,transparent:true,opacity:0.18,emissive:0xf08060,emissiveIntensity:0.0,roughness:0.2});
    const fb=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.13,len,8),fmat);
    fb.rotation.z=Math.PI/2; const midR=R_gmt_led+len/2;
    fb.position.set(midR*Math.cos(a),top+0.25,midR*Math.sin(a)); fb.rotation.y=-a;
    dialG.add(fb); gmt[k].fiber=fmat;
  }
  // hour: short raised pipes 0.5mm above minute plane (stubby = hour hand)
  for(let i=0;i<12;i++){
    const ledObj=mkLed(R_hub,i*30,0xf2a623,top+0.12);
    const a=i*30*Math.PI/180,len=R_hour_tip-R_hub;
    const pmat=new THREE.MeshStandardMaterial({color:0xf2a623,transparent:true,opacity:0.12,emissive:0xf2a623,emissiveIntensity:0.0,roughness:0.2});
    const pipe=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.42,len,12),pmat);
    pipe.rotation.z=Math.PI/2; const midR=R_hub+len/2;
    pipe.position.set(midR*Math.cos(a),HOUR_Y,midR*Math.sin(a)); pipe.rotation.y=-a;
    dialG.add(pipe); hour.push({led:ledObj,pipe:pmat});
  }
  const hub=new THREE.Mesh(new THREE.CylinderGeometry(1.6,1.6,2.2,32),
    new THREE.MeshStandardMaterial({color:0x222222,roughness:0.6}));
  hub.position.y=top+1.1; dialG.add(hub);

  // ---- CONTROLLER BOARD GROUP (below) ----
  const ctrlG=new THREE.Group(); root.add(ctrlG);
  const ctrlBoard=new THREE.Mesh(new THREE.CylinderGeometry(17.5,17.5,0.8,96),
    new THREE.MeshStandardMaterial({color:0x14233a,roughness:0.6,metalness:0.2}));
  ctrlG.add(ctrlBoard);
  // components: AVR (big), RTC, accel, LiPo, charger
  function chip(x,z,w,d,h,col){
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
      new THREE.MeshStandardMaterial({color:col,roughness:0.5,metalness:0.3}));
    m.position.set(x,0.4+h/2,z); ctrlG.add(m); return m;
  }
  chip(0,0,5,5,0.9,0x1a1a1a);      // ATmega328 QFN
  chip(8,2,3,3,0.7,0x2a2a2a);      // RTC
  chip(8,-3,2,2,0.6,0x2a2a2a);     // accel
  chip(-7,-4,4,3,0.7,0x3a2a1a);    // charger area
  // LiPo as a thick disc under controller
  const lipo=new THREE.Mesh(new THREE.CylinderGeometry(14,14,3.2,64),
    new THREE.MeshStandardMaterial({color:0x3a3030,roughness:0.7}));
  ctrlG.add(lipo);

  // connector between boards
  const conn=new THREE.Mesh(new THREE.BoxGeometry(8,1,2),
    new THREE.MeshStandardMaterial({color:0x555,roughness:0.5}));
  root.add(conn);

  // vertical layout (assembled vs exploded)
  function layout(explodeF){
    const e=explodeF;
    dialG.position.y = 6 + e*8;
    conn.position.set(0, 3 + e*4, 9);
    ctrlG.position.y = 0;
    lipo.position.y = -2.0 - e*3;
  }
  layout(0);

  // ---- ANIMATION: time-lapse clock ----
  let simSeconds = 10*3600 + 8*60 + 30; // start 10:08:30
  let playing=true, speed=40;
  const clock=document.getElementById('clock');

  function setIntensity(obj,val){ obj.mat.emissiveIntensity=val; obj.mat.color.copy(val>0.05?obj.color:new THREE.Color(0x222222)); }

  function render(){
    // seconds with sweep: light the floor LED bright, next one dimming up
    const s=simSeconds%60, sf=simSeconds%1; // fractional
    const sFloor=Math.floor(s), sFrac=s-sFloor;
    sec.forEach((o,i)=>{
      let v=0;
      if(i===sFloor) v=1-sFrac;
      else if(i===(sFloor+1)%60) v=sFrac;
      o.mat.emissiveIntensity=v*0.9;
      o.mat.color.copy(v>0.04?o.color:new THREE.Color(0x222222));
    });
    // minute: ring LED + flush minute HAND pipe
    const m=Math.floor(simSeconds/60)%60;
    min.forEach((o,i)=>{ const on=(i===m); o.mat.emissiveIntensity=on?0.8:0; o.mat.color.copy(on?o.color:new THREE.Color(0x222222)); });
    minHand.forEach((mat,i)=>{ const on=(i===m); mat.emissiveIntensity=on?0.75:0; mat.opacity=on?0.85:0.10; });
    // hour pipe
    const h12=Math.floor(simSeconds/3600)%12;
    hour.forEach((o,i)=>{ const on=(i===h12); o.led.mat.emissiveIntensity=on?0.8:0; o.led.mat.color.copy(on?o.led.color:new THREE.Color(0x222222)); o.pipe.emissiveIntensity=on?0.7:0; o.pipe.opacity=on?0.7:0.12; });
    // GMT (24h) on rim
    const h24=Math.floor(simSeconds/3600)%24;
    gmt.forEach((o,k)=>{ const on=(k===h24); o.led.mat.emissiveIntensity=on?0.8:0; o.led.mat.color.copy(on?o.led.color:new THREE.Color(0x222222)); o.fiber.emissiveIntensity=on?0.7:0; o.fiber.opacity=on?0.6:0.18; });

    const hh=String(Math.floor(simSeconds/3600)%24).padStart(2,'0');
    const mm=String(m).padStart(2,'0'); const ss=String(sFloor).padStart(2,'0');
    clock.textContent=`${hh}:${mm}:${ss}`;
  }

  // orbit
  let down=false,btn=0,px=0,py=0,th=0.6,ph=0.7,rad=70,pX=0,pY=0;
  function cam(){const x=rad*Math.sin(ph)*Math.sin(th),y=rad*Math.cos(ph),z=rad*Math.sin(ph)*Math.cos(th);camera.position.set(x+pX,y,z);camera.lookAt(pX,pY,0);}
  cam();
  renderer.domElement.addEventListener('mousedown',e=>{down=true;btn=e.button;px=e.clientX;py=e.clientY;});
  addEventListener('mouseup',()=>down=false);
  addEventListener('mousemove',e=>{if(!down)return;const dx=e.clientX-px,dy=e.clientY-py;px=e.clientX;py=e.clientY;if(btn===2){pX-=dx*0.06;pY+=dy*0.06;}else{th-=dx*0.01;ph=Math.max(0.15,Math.min(Math.PI-0.15,ph-dy*0.01));}cam();});
  renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
  renderer.domElement.addEventListener('wheel',e=>{e.preventDefault();rad=Math.max(34,Math.min(160,rad+e.deltaY*0.05));cam();},{passive:false});

  document.getElementById('play').onclick=function(){playing=!playing;this.textContent=playing?'Pause':'Play';};
  document.getElementById('speed').oninput=function(){speed=+this.value;document.getElementById('spd').textContent=speed+'×';};
  document.getElementById('explode').onchange=function(){layout(this.checked?1:0);};

  let last=performance.now();
  function loop(now){
    requestAnimationFrame(loop);
    const dt=(now-last)/1000; last=now;
    if(playing){ simSeconds += dt*speed; th+=0.0015; cam(); }
    render();
    renderer.render(scene,camera);
  }
  requestAnimationFrame(loop);
  addEventListener('resize',()=>{const w=mount.clientWidth;renderer.setSize(w,H);camera.aspect=w/H;camera.updateProjectionMatrix();});
})();
</script>
