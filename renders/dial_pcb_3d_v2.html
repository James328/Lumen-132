<div id="info" style="font-family:system-ui,sans-serif;font-size:13px;color:#bbb;padding:6px 0;">
  Drag to orbit · scroll to zoom · right-drag to pan
</div>
<div id="app" style="width:100%;height:560px;border-radius:12px;overflow:hidden;background:#111;"></div>
<div id="legend" style="font-family:system-ui,sans-serif;font-size:12px;color:#999;padding:8px 0;display:flex;gap:18px;flex-wrap:wrap;">
  <span><b style="color:#5fa8ff">●</b> second (60)</span>
  <span><b style="color:#4fd6a6">●</b> minute (60)</span>
  <span><b style="color:#f2a623">●</b> hour (12, hub → hand-pipes)</span>
  <span><b style="color:#f08060">●</b> GMT (24, piped to rim)</span>
  <span><b style="color:#cccccc">●</b> registration posts (3, asymmetric)</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const mount = document.getElementById('app');
  const W = mount.clientWidth, H = 560;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  const camera = new THREE.PerspectiveCamera(40, W/H, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  mount.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const key = new THREE.DirectionalLight(0xffffff, 0.9); key.position.set(20,40,30); scene.add(key);
  const fill = new THREE.DirectionalLight(0x88aaff, 0.4); fill.position.set(-30,20,-20); scene.add(fill);

  const root = new THREE.Group(); scene.add(root);

  const Rdial = 18.5, Tpcb = 0.8;
  const board = new THREE.Mesh(
    new THREE.CylinderGeometry(Rdial, Rdial, Tpcb, 96),
    new THREE.MeshStandardMaterial({color:0x0a1a0f, roughness:0.7, metalness:0.1})
  );
  root.add(board);
  const top = Tpcb/2;

  // gold 24h bezel ring at the very rim (GMT reads against this)
  const bezel = new THREE.Mesh(
    new THREE.TorusGeometry(18.2, 0.4, 10, 120),
    new THREE.MeshStandardMaterial({color:0xC9A227, roughness:0.3, metalness:0.85})
  );
  bezel.rotation.x = Math.PI/2; bezel.position.y = top+0.2; root.add(bezel);

  // 24h tick marks on bezel (printed to match the nudged GMT angles)
  function gapCenter(a){ const n=Math.round((a-3)/6); return ((3+6*n)%360+360)%360; }
  for(let k=0;k<24;k++){
    const ang = gapCenter(k*15)*Math.PI/180;
    const tick = new THREE.Mesh(
      new THREE.BoxGeometry(0.25,0.3,(k%6===0)?1.4:0.8),
      new THREE.MeshStandardMaterial({color:0xddc97a, roughness:0.4, metalness:0.6})
    );
    const r=18.2;
    tick.position.set(r*Math.cos(ang), top+0.45, r*Math.sin(ang));
    tick.rotation.y = -ang; root.add(tick);
  }

  function led(r, angDeg, color, y){
    const a = angDeg*Math.PI/180;
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(0.6,0.25,0.3),
      new THREE.MeshStandardMaterial({color:color, emissive:color, emissiveIntensity:0.35, roughness:0.4})
    );
    m.position.set(r*Math.cos(a), (y||top+0.12), r*Math.sin(a));
    m.rotation.y = -a; root.add(m);
  }

  const R_sec=16.5, R_min=14.5, R_gmt_led=13.0, R_rim=18.0;
  for(let i=0;i<60;i++) led(R_sec, i*6, 0x5fa8ff);
  for(let i=0;i<60;i++) led(R_min, i*6, 0x4fd6a6);

  // GMT: LED at r=13, fiber runs RADIALLY out to rim through the gaps (single plane, flat)
  for(let k=0;k<24;k++){
    const nud = gapCenter(k*15);
    const a = nud*Math.PI/180;
    led(R_gmt_led, nud, 0xf08060);
    const len = R_rim - R_gmt_led;
    const fiber = new THREE.Mesh(
      new THREE.CylinderGeometry(0.13,0.13,len,8),
      new THREE.MeshStandardMaterial({color:0xf08060, transparent:true, opacity:0.55, emissive:0xf08060, emissiveIntensity:0.3, roughness:0.2})
    );
    fiber.rotation.z = Math.PI/2;
    const midR = R_gmt_led + len/2;
    fiber.position.set(midR*Math.cos(a), top+0.25, midR*Math.sin(a));
    fiber.rotation.y = -a; root.add(fiber);
  }

  const R_hub=2.5;
  const R_min_tip=14.0, R_hour_tip=9.5;     // minute reaches the ring; hour is short
  const PLATE_TOP=1.30, HOUR_Y=1.80;        // flush minute at plate face, hour raised 0.5mm

  // MINUTE: 60 flush hand-pipes, long+thin, sitting at plate top (flush dial plane)
  for(let i=0;i<60;i++){
    const a=i*6*Math.PI/180;
    const len=R_min_tip-R_hub;
    const pipe=new THREE.Mesh(
      new THREE.CylinderGeometry(0.22,0.22,len,8),
      new THREE.MeshStandardMaterial({color:0x4fd6a6, transparent:true, opacity:0.28, emissive:0x4fd6a6, emissiveIntensity:0.18, roughness:0.2})
    );
    pipe.rotation.z=Math.PI/2; const midR=R_hub+len/2;
    pipe.position.set(midR*Math.cos(a), top+PLATE_TOP, midR*Math.sin(a)); pipe.rotation.y=-a;
    root.add(pipe);
  }

  // HOUR: 12 LEDs at hub feeding SHORT, RAISED hand-pipes (stubby = hour hand)
  for(let i=0;i<12;i++) led(R_hub, i*30, 0xf2a623, top+0.12);
  for(let i=0;i<12;i++){
    const a=i*30*Math.PI/180;
    const len = R_hour_tip-R_hub;
    const pipe = new THREE.Mesh(
      new THREE.CylinderGeometry(0.42,0.42,len,12),
      new THREE.MeshStandardMaterial({color:0xf2a623, transparent:true, opacity:0.5, emissive:0xf2a623, emissiveIntensity:0.25, roughness:0.2})
    );
    pipe.rotation.z = Math.PI/2;
    const midR = R_hub + len/2;
    pipe.position.set(midR*Math.cos(a), top+HOUR_Y, midR*Math.sin(a));
    pipe.rotation.y = -a; root.add(pipe);
  }

  const hub = new THREE.Mesh(
    new THREE.CylinderGeometry(1.6,1.6,2.6,32),
    new THREE.MeshStandardMaterial({color:0x222222, roughness:0.6})
  );
  hub.position.y = top+1.3; root.add(hub);

  // 3 asymmetric registration posts: 0, 130, 240 deg
  [0,130,240].forEach(deg=>{
    const a=deg*Math.PI/180, r=16.0;
    const post=new THREE.Mesh(
      new THREE.CylinderGeometry(0.8,0.8,2.2,20),
      new THREE.MeshStandardMaterial({color:0xcccccc, roughness:0.3, metalness:0.6})
    );
    post.position.set(r*Math.cos(a), top+1.1, r*Math.sin(a)); root.add(post);
  });

  root.rotation.x = -0.15;

  let isDown=false, btn=0, px=0, py=0;
  let theta=0, phi=0.85, radius=58, panX=0, panY=0;
  function updateCam(){
    const x=radius*Math.sin(phi)*Math.sin(theta);
    const y=radius*Math.cos(phi);
    const z=radius*Math.sin(phi)*Math.cos(theta);
    camera.position.set(x+panX,y,z); camera.lookAt(panX,panY,0);
  }
  updateCam();
  renderer.domElement.addEventListener('mousedown', e=>{isDown=true;btn=e.button;px=e.clientX;py=e.clientY;auto=false;});
  window.addEventListener('mouseup', ()=>isDown=false);
  window.addEventListener('mousemove', e=>{
    if(!isDown) return;
    const dx=e.clientX-px, dy=e.clientY-py; px=e.clientX; py=e.clientY;
    if(btn===2){ panX-=dx*0.05; panY+=dy*0.05; }
    else { theta-=dx*0.01; phi=Math.max(0.15,Math.min(Math.PI-0.15, phi-dy*0.01)); }
    updateCam();
  });
  renderer.domElement.addEventListener('contextmenu', e=>e.preventDefault());
  renderer.domElement.addEventListener('wheel', e=>{
    e.preventDefault(); radius=Math.max(26,Math.min(140,radius+e.deltaY*0.05)); updateCam();
  }, {passive:false});

  let auto=true;
  function animate(){ requestAnimationFrame(animate); if(auto){theta+=0.004; updateCam();} renderer.render(scene,camera); }
  animate();
  window.addEventListener('resize', ()=>{ const w=mount.clientWidth; renderer.setSize(w,H); camera.aspect=w/H; camera.updateProjectionMatrix(); });
})();
</script>
